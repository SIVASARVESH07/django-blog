{% extends 'base.html' %}

{% load crispy_forms_tags %}
{% block content %}
<div class="row">
    {% include 'dashboards/sidebar.html' %}

    <div class="col-md-9">
    <h2>Add new Post</h2>
    <form action="{% url 'edit_post' post.id %}" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{form |crispy}}
        <button type="submit" class="btn btn-warning">Submit</button>
    </form>
    </div>
</div>
{% endblock %}
