{% extends 'base.html' %}

{% load crispy_forms_tags %} 
{% block content %}

<h3 class="text-center">Login</h3>
<form action="{% url 'login' %}" method="POST" style="width:500px;margin:auto">
    {% csrf_token %}
    {{auth_form | crispy}}
    <button type="submit" class="btn btn-warning">Login</button>
</form>

{% endblock %}
